<!doctype html>
<html lang="en">
  <head>
    <title> Temple of Athena</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="temple_of athens-v1.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" auto-rotate scale="0.02 0.02 0.02" orientation="0deg -90deg 90deg">
      <button class="Hotspot" slot="hotspot-1" data-position="-7.919432220832766m 3.858807807202682m -0.40096092035074715m" data-normal="-0.2003734213787656m -0.03345878586110213m 0.9791480999591781m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation"> Temple of Athena</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  </body>
</html>
